version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosec
    - goconst
    - misspell
    - revive

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  govet:
    enable-all: true
  goconst:
    min-len: 3
    min-occurrences: 3
  revive:
    rules:
      - name: exported
        arguments:
          - "checkPrivateReceivers"

issues:
  exclude-use-default: false
  max-issues-per-linter: 50
  max-same-issues: 3
