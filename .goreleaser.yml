version: 2

builds:
  - main: ./cmd/ali
    binary: ali
    ldflags:
      - -s -w
      - -X github.com/philmehew/ali/internal/version.Version={{.Version}}
      - -X github.com/philmehew/ali/internal/version.Commit={{.Commit}}
      - -X github.com/philmehew/ali/internal/version.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^chore:'
      - '^ci:'
